spring.batch.job.enabled=false 

spring.datasource.url=${BATCH_DB_URL:jdbc:postgresql://localhost:5432/stodb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:}


spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true


logging.level.org.hibernate.orm.jdbc.bind=TRACE

# MyBatis XML ?? ?? ??
mybatis.mapper-locations=classpath:mapper/**/*.xml
# MyBatis snake -> camel ??
mybatis.configuration.map-underscore-to-camel-case=true

# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Spring Batch metadata tables are required for Job execution history.
# Enable schema initialization for the batch module's database.
spring.batch.jdbc.initialize-schema=never

# Blockchain
blockchain.rpc-url=${BLOCKCHAIN_RPC_URL:}
blockchain.issuer-private-key=${BLOCKCHAIN_PRIVATE_KEY:}
